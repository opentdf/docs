# Only alert for suggestions and above
MinAlertLevel = suggestion

# To add technical writing linter
# Packages = RedHat

StylesPath = .github/vale-styles

Vocab = Opentdf

[formats]
mdx = md

# Config for Markdown files
[*.md]
BasedOnStyles = Vale #, RedHat
# Vale.Terms produces nonsensical substitutions when accept.txt contains regex patterns;
# vocabulary-based terminology acceptance is handled via accept.txt instead.
Vale.Terms = NO

# ignore yaml blocks
[*]
BlockIgnores = (?s) *(\x60\x60\x60yaml.*?\x60\x60\x60), \
(?s) *(\x60\x60\x60typescript.*?\x60\x60\x60)

