name: Update vendored OpenAPI specs

on:
  workflow_dispatch:

concurrency:
  group: update-vendored-specs
  cancel-in-progress: true

jobs:
  update-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Update vendored specs
        run: npm run update-vendored-yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain specs/)" ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No spec changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git status --porcelain specs/
          fi

      - name: Check for existing PR
        if: steps.diff.outputs.changes == 'true'
        id: existing-pr
        run: |
          PR_NUMBER=$(gh pr list --head chore/update-vendored-specs --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "Found existing PR #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update branch
        if: steps.diff.outputs.changes == 'true'
        run: |
          BRANCH=chore/update-vendored-specs
          git fetch origin main "$BRANCH" || true
          git checkout -B "$BRANCH" origin/main
          npm run update-vendored-yaml
          git add specs/
          if git diff --cached --quiet; then
            echo "Branch already has latest specs, nothing to commit."
          else
            git commit -m "chore(deps): update vendored OpenAPI specs"
            git push -u origin "$BRANCH" --force-with-lease
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        if: steps.diff.outputs.changes == 'true' && steps.existing-pr.outputs.pr_number == ''
        run: |
          gh pr create \
            --title "chore(deps): update vendored OpenAPI specs" \
            --body "Automated update of vendored OpenAPI specs in \`specs/\` to match upstream \`opentdf/platform\`." \
            --head chore/update-vendored-specs \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
