name: Surge Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'docs/**'
      - 'code_samples/**'
      - 'src/**'
      - 'static/**'
      - 'blog/**'
      - 'specs/**'
      - 'docusaurus.config.ts'
      - 'sidebars.js'

jobs:
  build:
    if: github.event.action != 'closed'
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write PR metadata
        run: |
          printf '{"pr_number":%s,"action":"%s"}' \
            "${{ github.event.number }}" "${{ github.event.action }}" \
            > pr-metadata.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: surge-preview
          path: |
            build/
            pr-metadata.json
          retention-days: 1

  record-close:
    if: github.event.action == 'closed'
    name: Record close
    runs-on: ubuntu-latest
    steps:
      - name: Write teardown metadata
        run: |
          printf '{"pr_number":%s,"action":"closed"}' \
            "${{ github.event.number }}" > pr-metadata.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: surge-preview
          path: pr-metadata.json
          retention-days: 1
