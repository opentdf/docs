name: Surge Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'docs/**'
      - 'code_samples/**'
      - 'src/**'
      - 'static/**'
      - 'blog/**'
      - 'specs/**'
      - 'docusaurus.config.ts'
      - 'sidebars.js'

jobs:
  build:
    if: github.event.action != 'closed'
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update vendored OpenAPI specs
        run: npm run update-vendored-yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build website
        id: build
        run: npm run gen-api-docs-all && npx docusaurus build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write PR metadata
        if: always()
        run: |
          printf '{"pr_number":%s,"action":"%s","build_success":%s}' \
            "${{ github.event.number }}" \
            "${{ github.event.action }}" \
            "${{ steps.build.outcome == 'success' && 'true' || 'false' }}" \
            > pr-metadata.json

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surge-preview
          # build/ only exists on success; if-no-files-found: warn lets the
          # artifact upload succeed with just pr-metadata.json on failure.
          path: |
            build/
            pr-metadata.json
          if-no-files-found: warn
          retention-days: 1

  record-close:
    if: github.event.action == 'closed'
    name: Record close
    runs-on: ubuntu-latest
    steps:
      - name: Write teardown metadata
        run: |
          printf '{"pr_number":%s,"action":"closed","build_success":true}' \
            "${{ github.event.number }}" > pr-metadata.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: surge-preview
          path: pr-metadata.json
          retention-days: 1
